services:
  tmf638-backend:
    build:
      context: .
      dockerfile: Containerfile.backend.tmf638
    container_name: tmf638-backend
    environment:
      DB_PATH: /data/services.db
    ports:
      - "8081:8081"
    volumes:
      - tmf638-data:/data

  tmf638-mcp-server:
    build:
      context: .
      dockerfile: Containerfile.mcp.tmf638
    container_name: tmf638-mcp-server
    depends_on:
      - tmf638-backend
    environment:
      TMF638_BASE_URL: http://tmf638-backend:8081/tmf-api/serviceInventory/v5
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
      MCP_PATH: /mcp
    ports:
      - "8001:8001"
    stdin_open: true
    tty: true

volumes:
  tmf638-data:
