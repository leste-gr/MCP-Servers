services:
  tmf621-backend:
    build:
      context: .
      dockerfile: Containerfile.backend
    container_name: tmf621-backend
    environment:
      DB_PATH: /data/tickets.db
    ports:
      - "8080:8080"
    volumes:
      - tmf621-data:/data

  tmf621-mcp-server:
    build:
      context: .
      dockerfile: Containerfile.mcp
    container_name: tmf621-mcp-server
    depends_on:
      - tmf621-backend
    environment:
      TMF621_BASE_URL: http://tmf621-backend:8080/tmf-api/troubleTicket/v5
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      MCP_PATH: /mcp
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true

  wifi-calling-mcp-server:
    build:
      context: .
      dockerfile: Containerfile.mcp.wifi_calling
    container_name: wifi-calling-mcp-server
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8011
      MCP_PATH: /mcp
    ports:
      - "8011:8011"
    stdin_open: true
    tty: true

  troubleshooting-mcp-server:
    build:
      context: .
      dockerfile: Containerfile.mcp.troubleshooting
    container_name: troubleshooting-mcp-server
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8012
      MCP_PATH: /mcp
    ports:
      - "8012:8012"
    stdin_open: true
    tty: true

volumes:
  tmf621-data:
