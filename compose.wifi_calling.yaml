services:
  wifi-calling-mcp-server:
    build:
      context: .
      dockerfile: Containerfile.mcp.wifi_calling
    container_name: wifi-calling-mcp-server
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8011
      MCP_PATH: /mcp
    ports:
      - "8011:8011"
    stdin_open: true
    tty: true